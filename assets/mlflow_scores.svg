<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="MLflow scores placeholder">
  <rect width="900" height="420" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="55" y="52" font-size="30" font-weight="700" fill="#14213d">Evaluation Outputs</text>
    <text x="55" y="82" font-size="16" fill="#5d6b82">Metrics are saved to scores.json and logged to MLflow.</text>
    <rect x="70" y="130" width="330" height="210" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="110" y="190" font-size="24" font-weight="700" fill="#0f766e">scores.json</text>
    <text x="110" y="235" font-size="18" fill="#14213d">{ "loss": value }</text>
    <text x="110" y="270" font-size="18" fill="#14213d">{ "accuracy": value }</text>
    <rect x="500" y="130" width="330" height="210" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="540" y="190" font-size="24" font-weight="700" fill="#2563eb">MLflow Run</text>
    <text x="540" y="235" font-size="18" fill="#14213d">params</text>
    <text x="540" y="270" font-size="18" fill="#14213d">metrics</text>
    <text x="540" y="305" font-size="18" fill="#14213d">keras model</text>
  </g>
</svg>

