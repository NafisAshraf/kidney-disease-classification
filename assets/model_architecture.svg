<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" role="img" aria-label="VGG16 model architecture">
  <rect width="1100" height="420" fill="#f8fafc"/>
  <g font-family="Arial, sans-serif">
    <text x="55" y="58" font-size="34" font-weight="700" fill="#14213d">Model Architecture</text>
    <text x="55" y="92" font-size="18" fill="#5d6b82">Frozen VGG16 feature extractor with a small classification head.</text>
    <g transform="translate(65 150)">
      <rect width="190" height="130" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
      <text x="95" y="58" font-size="22" text-anchor="middle" font-weight="700" fill="#1e3a8a">Input</text>
      <text x="95" y="88" font-size="16" text-anchor="middle" fill="#1e3a8a">224 x 224 x 3</text>
    </g>
    <g transform="translate(330 130)">
      <rect width="245" height="170" rx="8" fill="#ccfbf1" stroke="#5eead4"/>
      <text x="122" y="70" font-size="24" text-anchor="middle" font-weight="700" fill="#115e59">VGG16</text>
      <text x="122" y="104" font-size="16" text-anchor="middle" fill="#115e59">ImageNet weights</text>
      <text x="122" y="132" font-size="16" text-anchor="middle" fill="#115e59">Frozen convolution blocks</text>
    </g>
    <g transform="translate(650 150)">
      <rect width="170" height="130" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
      <text x="85" y="58" font-size="22" text-anchor="middle" font-weight="700" fill="#92400e">Flatten</text>
      <text x="85" y="88" font-size="16" text-anchor="middle" fill="#92400e">Feature vector</text>
    </g>
    <g transform="translate(895 150)">
      <rect width="150" height="130" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
      <text x="75" y="58" font-size="22" text-anchor="middle" font-weight="700" fill="#991b1b">Dense</text>
      <text x="75" y="88" font-size="16" text-anchor="middle" fill="#991b1b">Softmax, 2</text>
    </g>
    <path d="M255 215h75M575 215h75M820 215h75" stroke="#14213d" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>

